# version: 0.1.0
# last_updated: 2026-06-03
/**:
  ros__parameters:
    sim:
      enabled: false
      time_scale: 1.0

      scene:
        wall_count: 1
        active_wall_index: 0
        rows: 5
        cols: 5
        source_frame: "body"
        grid_origin_map:
          x: 0.60
          y: 0.80
          z: 1.80
          yaw: 0.0
        wall_spacing_y: 2.50
        box_size:
          length: 0.40
          width: 0.40
          height: 0.40
        missing_slots: []

      sensor:
        publish_rate_hz: 10.0
        output_mode: "adapter_input"       # adapter_input | adapter_bypass
        confidence: 0.95
        face_inlier_count: 32

      fake_base:
        enabled: false
        odom_frame: "odom"
        alignment_topic: "/sim/fake_base_alignment"
        nav2_goal_duration_sec: 0.30
        integration_rate_hz: 50.0
        amcl_publish_rate_hz: 20.0
        initial_position_offset_m: 0.10
        initial_yaw_offset_rad: 0.0873
        desired_distance_to_wall: 0.60
        desired_yaw_to_wall: 0.0
        command_deadband:
          linear_x: 0.0005
          angular_z: 0.0005

      frames:
        map: "map"
        base_link: "base_link"
        body: "body"
        camera_link: "camera_link"
        d2_base_link: "2d_base_link"

      debug:
        publish_markers: true
        marker_topic: "/sim/markers"
        publish_private_topics: true
